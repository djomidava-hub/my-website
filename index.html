<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💄</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Ламара Джомидава | Визажист</title>

    <style>
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --accent-hover: #9333ea;
            --text-dark: #f3e8ff;
            --text-light: #c4b5d9;
            --bg-dark: linear-gradient(135deg, #1a1025 0%, #2d1f3d 25%, #3d2855 50%, #2d1f3d 75%, #1a1025 100%);
            --card-bg: rgba(45, 31, 61, 0.7);
            --card-border: rgba(168, 85, 247, 0.3);
            --shadow: rgba(168, 85, 247, 0.15);
            --card-glow: 0 0 60px rgba(168, 85, 247, 0.2);
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg-dark); background-size: 400% 400%;
            animation: silkMove 20s ease infinite;
            color: var(--text-dark); 
            font-family: var(--font-body);
            padding: 30px 15px; overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes silkMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glitter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .content {
            position: relative; z-index: 2; text-align: center; 
            width: 100%; max-width: 400px;
            padding: 40px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; 
            border: 1px solid var(--card-border);
            box-shadow: var(--card-glow);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        p.brand { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 6px; margin-bottom: 15px; font-weight: 600; font-family: var(--font-body); text-shadow: 0 0 20px var(--accent-glow); }
        h1 { font-size: 2.5rem; font-weight: 300; margin-bottom: 30px; color: var(--text-dark); letter-spacing: -1px; font-family: var(--font-heading); line-height: 1.1; text-shadow: 0 0 30px var(--accent-glow); }

        .services { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 30px; }
        .service-card { background: rgba(168, 85, 247, 0.1); padding: 15px 5px; border-radius: 20px; border: 1px solid var(--card-border); transition: 0.3s ease; }
        .service-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--shadow); background: rgba(168, 85, 247, 0.2); border-color: var(--accent); }
        .service-card span { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .service-card p { font-size: 0.5rem; text-transform: uppercase; font-weight: 700; color: var(--text-light); line-height: 1.3; letter-spacing: 0.5px; }

        .portfolio-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; margin: 10px 0 12px 0; color: var(--accent); font-weight: 600; font-family: var(--font-body); text-shadow: 0 0 15px var(--accent-glow); }
        
        .portfolio-container { position: relative; width: 100%; margin-bottom: 20px; overflow: hidden; }

        .portfolio-grid { 
            display: flex; gap: 10px; overflow-x: auto; overflow-y: hidden;
            padding: 5px 8px 20px 8px; scroll-snap-type: x mandatory; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            width: 100%;
        }
        .portfolio-grid::-webkit-scrollbar { display: none; }
        
        .portfolio-item {
            min-width: 130px; height: 180px; 
            background: rgba(168, 85, 247, 0.15); 
            border-radius: 24px; overflow: hidden; 
            scroll-snap-align: start; 
            border: 1px solid var(--card-border); 
            flex-shrink: 0; transition: 0.3s ease;
        }
        .portfolio-item:hover { transform: scale(1.03); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Стрелки — только для ПК */
        .scroll-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px; background: rgba(168, 85, 247, 0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
            transition: 0.3s ease; border: 1px solid var(--card-border); user-select: none;
        }
        .scroll-arrow svg { width: 18px; height: 18px; fill: var(--text-dark); pointer-events: none; }
        .scroll-arrow:hover { background: rgba(168, 85, 247, 0.6); transform: translateY(-50%) scale(1.1); box-shadow: 0 6px 30px rgba(168, 85, 247, 0.6); }
        .scroll-arrow:active { transform: translateY(-50%) scale(0.95); }
        .scroll-arrow.auto-scroll { background: rgba(168, 85, 247, 0.8); box-shadow: 0 0 40px rgba(168, 85, 247, 0.8); animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.6); } 50% { box-shadow: 0 0 50px rgba(168, 85, 247, 0.9); } }
        .scroll-arrow.left { left: 5px; }
        .scroll-arrow.right { right: 5px; }
        .scroll-arrow.hidden { opacity: 0; pointer-events: none; }

        .portfolio-fade { position: absolute; top: 5px; bottom: 20px; width: 40px; pointer-events: none; z-index: 5; }
        .portfolio-fade.left { left: 0; background: linear-gradient(to right, rgba(45,31,61,0.95), transparent); }
        .portfolio-fade.right { right: 0; background: linear-gradient(to left, rgba(45,31,61,0.95), transparent); }

        .btn {
            display: block; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: #fff; padding: 20px; border-radius: 28px; text-decoration: none; 
            font-size: 0.8rem; font-weight: 600; letter-spacing: 3px; margin: 10px 0 35px 0;
            box-shadow: 0 15px 40px var(--accent-glow); transition: 0.3s ease;
            text-transform: uppercase; font-family: var(--font-body);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(168, 85, 247, 0.5); }
        .btn:active { transform: scale(0.98); }

        .socials { display: flex; gap: 18px; justify-content: center; }
        .social-btn {
            width: 55px; height: 55px; background: rgba(168, 85, 247, 0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px var(--shadow); text-decoration: none; transition: 0.3s ease;
            border: 1px solid var(--card-border);
        }
        .social-btn:hover { transform: translateY(-5px); background: rgba(168, 85, 247, 0.4); box-shadow: 0 12px 30px rgba(168, 85, 247, 0.4); border-color: var(--accent); }
        .social-btn svg { width: 24px; height: 24px; fill: var(--text-dark); transition: 0.3s ease; }
        .social-btn:hover svg { fill: #fff; }

        .dot { position: absolute; background: var(--accent); border-radius: 50%; opacity: 0.5; animation: shine var(--d) infinite; box-shadow: 0 0 10px var(--accent-glow); }
        @keyframes shine { 0%, 100% { opacity: 0.2; transform: translateY(0) scale(1); } 50% { opacity: 0.7; transform: translateY(-35px) scale(1.3); } }

        @media (min-width: 600px) {
            .content { max-width: 450px; padding: 50px 30px; }
            h1 { font-size: 3rem; }
            .portfolio-item { min-width: 145px; height: 200px; }
        }
        @media (min-width: 900px) {
            body { padding: 50px 30px; }
            .content { max-width: 500px; }
            .portfolio-item { min-width: 160px; height: 220px; }
        }
        @media (hover: none) and (pointer: coarse) {
            .scroll-arrow { display: none !important; }
            .portfolio-fade { display: none; }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // ✨ Блестки
            const bg = document.getElementById('glitter');
            if (bg) {
                for (let i = 0; i < 35; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.style.left = Math.random() * 100 + '%';
                    dot.style.top = Math.random() * 100 + '%';
                    const size = Math.random() * 2 + 0.5 + 'px';
                    dot.style.width = size; dot.style.height = size;
                    dot.style.setProperty('--d', Math.random() * 5 + 3 + 's');
                    dot.style.animationDelay = Math.random() * 5 + 's';
                    bg.appendChild(dot);
                }
            }

            const grid = document.getElementById('portfolioGrid');
            const scrollLeft = document.getElementById('scrollLeft');
            const scrollRight = document.getElementById('scrollRight');
            
            if (!grid || !scrollLeft || !scrollRight) return;
            
            let autoScrollTimer = null;
            let isClicking = false; // 🔒 Флаг: идёт ли клик
            
            // Проверяем, что это ПК с мышью
            const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
            
            if (isDesktop) {
                
                // 🖱 Клик по стрелке — листает ровно на одно фото
                function scrollByClick(direction) {
                    // Останавливаем авто-скролл если он идёт
                    if (autoScrollTimer) {
                        clearInterval(autoScrollTimer);
                        autoScrollTimer = null;
                        scrollLeft.classList.remove('auto-scroll');
                        scrollRight.classList.remove('auto-scroll');
                    }
                    
                    // Блокируем ховер на 300мс чтобы не мешал
                    isClicking = true;
                    setTimeout(() => { isClicking = false; }, 300);
                    
                    // Считаем ширину одного элемента + отступ
                    const itemWidth = 130 + 10; // 130px фото + 10px gap
                    grid.scrollBy({ left: direction * itemWidth, behavior: 'smooth' });
                }
                
                scrollLeft.addEventListener('click', () => scrollByClick(-1));
                scrollRight.addEventListener('click', () => scrollByClick(1));
                
                // 🖱 Авто-скролл при наведении (только если не кликаем)
                function startAutoScroll(direction) {
                    if (isClicking) return;
                    stopAutoScroll();
                    
                    const arrow = direction < 0 ? scrollLeft : scrollRight;
                    arrow.classList.add('auto-scroll');
                    
                    autoScrollTimer = setInterval(() => {
                        if (isClicking) { stopAutoScroll(); return; }
                        grid.scrollLeft += direction * 0.2;
                        updateArrows();
                    }, 60);
                }
                
                function stopAutoScroll() {
                    if (autoScrollTimer) {
                        clearInterval(autoScrollTimer);
                        autoScrollTimer = null;
                    }
                    scrollLeft.classList.remove('auto-scroll');
                    scrollRight.classList.remove('auto-scroll');
                }
                
                scrollLeft.addEventListener('mouseenter', () => startAutoScroll(-1));
                scrollLeft.addEventListener('mouseleave', stopAutoScroll);
                scrollRight.addEventListener('mouseenter', () => startAutoScroll(1));
                scrollRight.addEventListener('mouseleave', stopAutoScroll);
            }
            
            // ➡️ Управление видимостью стрелок
            function updateArrows() {
                const maxScroll = grid.scrollWidth - grid.clientWidth;
                scrollLeft.classList.toggle('hidden', grid.scrollLeft <= 5);
                scrollRight.classList.toggle('hidden', grid.scrollLeft >= maxScroll - 5);
            }
            
            grid.addEventListener('scroll', updateArrows);
            window.addEventListener('resize', updateArrows);
            setTimeout(updateArrows, 300);
        });
    </script>
