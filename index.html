        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #ffffff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; cursor: crosshair;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .content { position: relative; z-index: 2; text-align: center; pointer-events: none; margin-bottom: 50px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 10px; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 10px; }

        /* Соцсети */
        .socials { position: relative; z-index: 3; display: flex; gap: 25px; }
        .social-link {
            width: 70px; height: 70px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px; /* Мягкий квадрат */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }
        svg { width: 32px; height: 32px; fill: white; transition: 0.3s; }

        /* Цвета при наведении */
        .social-link.inst:hover { 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            box-shadow: 0 10px 25px rgba(214, 36, 159, 0.5);
            border-color: transparent;
        }
        .social-link.tg:hover { 
            background: #0088cc;
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.5);
            border-color: transparent;
        }
        .social-link.wa:hover { 
            background: #25d366;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
            border-color: transparent;
        }
        .social-link:hover { transform: translateY(-12px) scale(1.1); }
        .social-link:hover svg { fill: white; transform: scale(1.1); }
    </style>
</head>

    <script>
        // ЛОГИКА ОСТАЕТСЯ ПРЕЖНЕЙ (ЭФФЕКТЫ ЧАСТИЦ И ЗВУК)
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        let particles = []; let explosions = []; const mouse = { x: null, y: null, radius: 120 };
        let audioCtx; function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playClickSound() {
            initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.social-link')) return; 
            playClickSound(); createExplosion(e.x, e.y);
        });
        class Particle {
            constructor(x, y) { this.x = x; this.y = y; this.baseX = x; this.baseY = y; this.size = Math.random() * 2 + 1; this.density = (Math.random() * 20) + 5; }
            draw() { ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius) {
                    this.x -= (dx / distance) * ((mouse.radius - distance) / mouse.radius) * this.density;
                    this.y -= (dy / distance) * ((mouse.radius - distance) / mouse.radius) * this.density;
                } else { this.x -= (this.x - this.baseX) / 15; this.y -= (this.y - this.baseY) / 15; }
            }
        }
        class Spark {
            constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 4 + 1; this.speedX = Math.random() * 10 - 5; this.speedY = Math.random() * 10 - 5; this.color = `hsl(${Math.random() * 40 + 180}, 100%, 70%)`; this.opacity = 1; }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.02; }
            draw() { ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }
        function createExplosion(x, y) { for (let i = 0; i < 25; i++) explosions.push(new Spark(x, y)); }
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; for (let i = 0; i < 150; i++) particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height));
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.draw(); p.update(); });
            explosions.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) explosions.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
