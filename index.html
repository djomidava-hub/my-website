<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamara Dzhomidava | Makeup</title>
    <style>
        :root {
            --rose-gold: #b76e79;
            --text-dark: #4a3437;
            --bg-rose: linear-gradient(135deg, #fce4ec 0%, #f1d5d2 25%, #e1b1ab 50%, #f1d5d2 75%, #fce4ec 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--bg-rose);
            background-size: 400% 400%;
            animation: silkMove 10s ease infinite;
            color: var(--text-dark);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        @keyframes silkMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glitter {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .content {
            position: relative; z-index: 2;
            text-align: center; width: 88%; max-width: 380px;
            padding: 45px 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(183, 110, 121, 0.15);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        p.brand { font-size: 0.75rem; color: var(--rose-gold); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 12px; font-weight: 600; }
        h1 { font-size: 2.4rem; font-weight: 300; margin-bottom: 35px; color: var(--text-dark); }

        .services { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 40px; }
        .service-card {
            background: rgba(255, 255, 255, 0.4);
            padding: 15px 5px; border-radius: 20px;
            border: 1px solid rgba(183, 110, 121, 0.2);
        }
        .service-card span { font-size: 1.4rem; display: block; margin-bottom: 5px; }
        .service-card p { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: #7d5a5e; }

        .btn {
            display: block; background: var(--text-dark); color: #fff;
            padding: 20px; border-radius: 25px;
            text-decoration: none; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 2px; margin-bottom: 35px;
            box-shadow: 0 10px 20px rgba(74, 52, 55, 0.2);
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.96); background: #332426; }

        .socials { display: flex; gap: 15px; justify-content: center; }
        .social-btn {
            width: 55px; height: 55px; background: rgba(255, 255, 255, 0.6);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(183, 110, 121, 0.1); transition: 0.3s;
            text-decoration: none; color: var(--text-dark);
            font-weight: 900; font-size: 0.75rem; letter-spacing: 0.5px;
        }
        .social-btn svg { width: 24px; height: 24px; fill: var(--text-dark); }
        .social-btn:active { transform: translateY(-5px); background: #fff; }

        .dot {
            position: absolute; background: #fff; border-radius: 50%; opacity: 0.5;
            animation: shine var(--d) infinite;
        }
        @keyframes shine {
            0%, 100% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(-20px) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="glitter" id="glitter"></div>

    <div class="content">
        <p class="brand">Lamara Dzhomidava</p>
        <h1>Визажист</h1>

        <div class="services">

            <div class="service-card"><span>👰</span><p>Bridal<br>Artist</p></div>
        </div>

        <a href="https://wa.me" class="btn">ЗАПИСАТЬСЯ</a>

            <!-- Универсальная ссылка MAX -->
            <a href="https://max.me" target="_blank" class="social-btn">MAX</a>
        </div>
    </div>

    <script>
        const bg = document.getElementById('glitter');
        const count = 40;
        for (let i = 0; i < count; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 4 + 1 + 'px';
            dot.style.width = size; dot.style.height = size;
            dot.style.setProperty('--d', Math.random() * 4 + 3 + 's');
            dot.style.animationDelay = Math.random() * 5 + 's';
            bg.appendChild(dot);
        }
    </script>
</body>
</html>
