<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💄%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Ламара Джомидава | Визажист</title>
    <style>
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text-dark: #f3e8ff;
            --text-light: #c4b5d9;
            --bg-dark: linear-gradient(135deg, #1a1025 0%, #2d1f3d 25%, #3d2855 50%, #2d1f3d 75%, #1a1025 100%);
            --card-bg: rgba(45, 31, 61, 0.7);
            --card-border: rgba(168, 85, 247, 0.3);
            --shadow: rgba(168, 85, 247, 0.15);
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg-dark);
            animation: bgAnim 20s ease infinite;
            color: var(--text-dark);
            font-family: var(--font-body);
            padding: 25px 12px; overflow-x: hidden;
        }

        @keyframes bgAnim { 0%{background-position:0%50%} 50%{background-position:100%50%} 100%{background-position:0%50%}}

        .glitter { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1; }

        .main-card {
            position: relative; z-index: 2; text-align: center; 
            width: 100%; max-width: 380px;
            padding: 35px 18px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px rgba(168,85,247,0.2);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn { from { opacity:0;transform:translateY(20px);} to {opacity:1;transform:translateY(0);} }

        p.brand { font-size: 0.65rem; color: var(--accent); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 12px; font-weight: 600; }
        h1 { font-size: 2.2rem; font-weight: 300; margin-bottom: 25px; letter-spacing: -1px; }

        .services { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 25px; }
        .service-card { background: rgba(168,85,247,0.1); padding: 12px 4px; border-radius: 18px; border: 1px solid var(--card-border); transition: 0.3s; }
        .service-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .service-card span { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .service-card p { font-size: 0.45rem; text-transform: uppercase; font-weight: 700; }

        .work-title { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; margin: 10px 0 10px 0; color: var(--accent); font-weight: 600; }
        
        .works-container { position: relative; width: 100%; margin-bottom: 18px; overflow: visible; }
        
        /* 🔧 ТЕЛЕФОН: СЕТКА 2 В РЯД */
        .works-slider { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 фото в ряд */
            gap: 8px;
            padding: 5px;
            width: 100%;
            position: relative;
            z-index: 3;
        }
        
        .work-item {
            width: 100%;
            height: 130px;
            background: rgba(168,85,247,0.15);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .work-item:hover { transform: scale(1.05); border-color: var(--accent); }
        .work-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            display: block; 
        }

        /* Стрелки (только ПК) */
        .arrow-btn {
            position: absolute; top:50%; transform:translateY(-50%);
            width:36px;height:36px;background:rgba(168,85,247,0.4);
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            cursor:pointer;z-index:10;box-shadow:0 4px 20px rgba(168,85,247,0.5);
            transition:0.3s;border:1px solid var(--card-border);user-select:none;
        }
        .arrow-btn svg { width:18px;height:18px;fill:var(--text-dark);pointer-events:none; }
        .arrow-btn:hover { background:rgba(168,85,247,0.7);transform:translateY(-50%)scale(1.1); }
        .arrow-btn.auto { background:rgba(168,85,247,0.9);animation:pulse 0.8s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 30px rgba(168,85,247,0.6)} 50%{box-shadow:0 0 50px rgba(168,85,247,0.9)} }
        .arrow-left { left:8px; } .arrow-right { right:8px; }
        .arrow-hidden { opacity:0;pointer-events:none; }

        .fade-overlay { position:absolute;top:5px;bottom:18px;width:45px;pointer-events:none;z-index:5;}
        .fade-left { left:0;background:linear-gradient(to right, rgba(45,31,61,0.9), transparent); }
        .fade-right { right:0;background:linear-gradient(to left, rgba(45,31,61,0.9), transparent); }

        .btn-main { display:block;background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff;padding:18px;border-radius:26px;text-decoration:none;font-size:0.75rem;font-weight:600;letter-spacing:3px;margin:10px 0 30px 0;transition:0.3s; }
        .btn-main:hover { transform:translateY(-3px); }

        .socials { display:flex;gap:16px;justify-content:center; }
        .social-link { width:50px;height:50px;background:rgba(168,85,247,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px var(--shadow);text-decoration:none;transition:0.3s;border:1px solid var(--card-border); }
        .social-link:hover { transform:translateY(-5px);background:rgba(168,85,247,0.4);border-color:var(--accent); }
        .social-link svg { width:22px;height:22px;fill:var(--text-dark);transition:0.3s; }
        .social-link:hover svg { fill:#fff; }

        .dot { position:absolute;background:var(--accent);border-radius:50%;opacity:0.5;animation:shine var(--d) infinite;box-shadow:0 0 10px var(--accent-glow); }
        @keyframes shine { 0%,100%{opacity:0.2;transform:translateY(0)scale(1);} 50%{opacity:0.7;transform:translateY(-35px)scale(1.3);} }

        /* Галерея */
        .gallery-modal { display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;flex-direction:column;backdrop-filter:blur(10px); }
        .gallery-modal.active { display:flex; }
        .gallery-img { max-width:95%;max-height:85%;border-radius:10px;box-shadow:0 0 30px var(--accent-glow); }
        .gallery-close { position:absolute;top:20px;right:20px;width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1000;border:2px solid var(--accent);transition:0.3s; }
        .gallery-close:hover { background:var(--accent);transform:rotate(90deg); }
        .gallery-nav { display:flex;gap:20px;margin-top:20px; }
        .gallery-nav-btn { width:48px;height:48px;background:rgba(168,85,247,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;border:2px solid var(--accent); }
        .gallery-nav-btn:hover { background:var(--accent);transform:scale(1.1); }
        .gallery-counter { color:#fff;font-size:1rem;margin-top:15px;opacity:0.8; }
        .gallery-arrow-svg { width:24px;height:24px;fill:#fff; }

        /* 📱 ТЕЛЕФОН: Скрываем стрелки и fade */
        @media(hover:none)and(pointer:coarse) { 
            .arrow-btn{display:none!important;}
            .fade-overlay{display:none;}
            .works-slider{grid-template-columns:repeat(2,1fr);gap:8px;}
        }

        /* 📟 ПЛАНШЕТ: Горизонтальный скролл */
        @media(min-width:600px) { 
            body{padding:35px 20px;}
            .main-card{max-width:450px;padding:45px 25px;}
            h1{font-size:2.8rem;}
            .works-slider{
                display:flex;
                gap:10px;
                overflow-x:auto;
                overflow-y:visible;
                padding:5px 55px 20px 55px;
                scroll-snap-type:x mandatory;
                scrollbar-width:none;
            }
            .works-slider::-webkit-scrollbar{display:none;}
            .work-item{min-width:95px;height:155px;flex-shrink:0;scroll-snap-align:start;}
            .arrow-btn{width:40px;height:40px;}
            .arrow-btn svg{width:20px;height:20px;}
        }

        /* 💻 ПК: Горизонтальный скролл */
        @media(min-width:900px) { 
            body{padding:50px 30px;}
            .main-card{max-width:500px;padding:50px 30px;}
            h1{font-size:3rem;}
            .works-slider{gap:12px;padding:5px 60px 22px 60px;}
            .work-item{min-width:120px;height:190px;}
            .arrow-btn{width:44px;height:44px;}
            .arrow-btn svg{width:22px;height:22px;}
        }
    </style>
</head>

    <script>
        const glitter = document.getElementById('glitterBg');
        if (glitter) {
            for (let i = 0; i < 35; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 0.5 + 'px';
                dot.style.width = size; dot.style.height = size;
                dot.style.setProperty('--d', Math.random() * 5 + 3 + 's');
                dot.style.animationDelay = Math.random() * 5 + 's';
                glitter.appendChild(dot);
            }
        }

        const slider = document.getElementById('worksSlider');
        const leftArrow = document.getElementById('scrollLeft');
        const rightArrow = document.getElementById('scrollRight');
        let autoScrollTimer = null;
        const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

        const SCROLL_SPEED = 0.3;
        const CLICK_AMOUNTS = { mobile: 83, tablet: 105, pc: 132 };

        function getClickAmount() {
            const w = window.innerWidth;
            return w < 600 ? CLICK_AMOUNTS.mobile : (w < 900 ? CLICK_AMOUNTS.tablet : CLICK_AMOUNTS.pc);
        }

        function clickScroll(direction) {
            stopAutoScroll();
            slider.scrollBy({ left: direction * getClickAmount(), behavior: 'smooth' });
        }

        function startAutoScroll(direction) {
            if (autoScrollTimer) clearInterval(autoScrollTimer);
            const arrow = direction < 0 ? leftArrow : rightArrow;
            arrow.classList.add('auto');
            autoScrollTimer = setInterval(() => {
                slider.scrollLeft += direction * SCROLL_SPEED;
                updateArrowsVisibility();
            }, 50);
        }

        function stopAutoScroll() {
            if (autoScrollTimer) {
                clearInterval(autoScrollTimer);
                autoScrollTimer = null;
            }
            leftArrow.classList.remove('auto');
            rightArrow.classList.remove('auto');
        }

        if (isDesktop && leftArrow && rightArrow) {
            leftArrow.addEventListener('click', () => clickScroll(-1));
            rightArrow.addEventListener('click', () => clickScroll(1));
            leftArrow.addEventListener('mouseenter', () => startAutoScroll(-1));
            leftArrow.addEventListener('mouseleave', stopAutoScroll);
            rightArrow.addEventListener('mouseenter', () => startAutoScroll(1));
            rightArrow.addEventListener('mouseleave', stopAutoScroll);
        }

        function updateArrowsVisibility() {
            if (!leftArrow || !rightArrow) return;
            const pos = slider.scrollLeft;
            const max = slider.scrollWidth - slider.clientWidth;
            leftArrow.classList.toggle('arrow-hidden', pos <= 10);
            rightArrow.classList.toggle('arrow-hidden', pos >= max - 10);
        }

        slider.addEventListener('scroll', updateArrowsVisibility);
        window.addEventListener('resize', updateArrowsVisibility);
        setTimeout(updateArrowsVisibility, 500);

        const modal = document.getElementById('galleryModal');
        const fullImg = document.getElementById('galleryImgFull');
        const counter = document.getElementById('galleryCounter');
        let currentPhoto = 1;
        const totalPhotos = 10;

        function openGallery(num) {
            currentPhoto = num;
            updateGalleryView();
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        function changePhoto(dir) {
            currentPhoto += dir;
            if (currentPhoto > totalPhotos) currentPhoto = 1;
            if (currentPhoto < 1) currentPhoto = totalPhotos;
            updateGalleryView();
        }

        function updateGalleryView() {
            fullImg.src = `${currentPhoto}.jpg`;
            counter.textContent = `${currentPhoto} / ${totalPhotos}`;
            document.getElementById('prevBtn').style.pointerEvents = currentPhoto === 1 ? 'none' : 'auto';
            document.getElementById('nextBtn').style.pointerEvents = currentPhoto === totalPhotos ? 'none' : 'auto';
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeGallery();
        });

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'Escape') closeGallery();
            if (e.key === 'ArrowLeft' && currentPhoto > 1) changePhoto(-1);
            if (e.key === 'ArrowRight' && currentPhoto < totalPhotos) changePhoto(1);
        });
    </script>
</body>
